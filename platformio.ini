; PlatformIO Project Configuration File
;
; Solardisplay – ESP32 CYD 2432S028 (2.8" ILI9341 + XPT2046 Touch)
;   - LVGL + TFT_eSPI touch UI
;   - Growatt Cloud API
;   - Shelly Pro 3EM (Gen2) local RPC
;   - Single on-board RGB LED (GPIO 4/16/17, common-anode)

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 460800
board_build.partitions = min_spiffs.csv

extra_scripts = pre:scripts/patch_lvgl.py

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    ; Ensure LVGL / TFT_eSPI can find our lv_conf.h in include/
    -I include
    ; ---- TFT_eSPI (self-contained, no User_Setup.h) ---------------------
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; ---- LVGL -----------------------------------------------------------
    -DLV_CONF_INCLUDE_SIMPLE

lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
    tzapu/WiFiManager @ ^2.0.17
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ 9.2.2
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
